<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — NestX</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo"><img src="https://dacpuhfkuprqqaqoxwll.supabase.co/storage/v1/object/public/assets/Birdhouse%20Logo.png" alt="NestX logo">NestX</a>
    <div class="nav-links">
      <a href="../browse.html">Browse homes</a>
    </div>
    <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
  </nav>

  <div class="container form-layout" style="max-width:480px;padding-top:4rem;padding-bottom:4rem;">
    <div class="form-card" id="resetCard">
      <h2 style="margin-bottom:0.5rem">Set new password</h2>
      <p class="card-subtitle">Choose a strong password for your NestX account.</p>

      <div id="resetError" class="form-error" style="display:none;margin-bottom:1rem"></div>

      <div id="resetForm">
        <div class="form-row">
          <label>New password <span class="req">*</span></label>
          <input type="password" id="newPassword" placeholder="At least 8 characters" onkeydown="if(event.key==='Enter')doResetPassword()">
        </div>
        <div class="form-row">
          <label>Confirm new password <span class="req">*</span></label>
          <input type="password" id="confirmPassword" placeholder="Repeat your new password" onkeydown="if(event.key==='Enter')doResetPassword()">
        </div>
        <div class="form-actions" style="margin-top:1.5rem">
          <button class="btn btn-primary btn-lg" onclick="doResetPassword()" id="resetBtn">Set new password</button>
        </div>
      </div>

      <div id="resetSuccess" style="display:none;text-align:center;padding:1rem 0">
        <div style="font-size:36px;margin-bottom:1rem">✅</div>
        <h3 style="margin-bottom:0.5rem">Password updated!</h3>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:1.5rem">Your password has been changed successfully.</p>
        <a href="../browse.html" class="btn btn-primary">Go to NestX →</a>
      </div>

      <div id="resetInvalid" style="display:none;text-align:center;padding:1rem 0">
        <div style="font-size:36px;margin-bottom:1rem">⚠️</div>
        <h3 style="margin-bottom:0.5rem">Link expired</h3>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:1.5rem">This password reset link has expired or already been used. Please request a new one.</p>
        <a href="../browse.html" class="btn btn-outline">Back to NestX</a>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script>
    // Check for valid reset session on page load
    async function initReset() {
      const { data: { session } } = await db.auth.getSession();

      // Supabase sets the session automatically from the URL hash
      // when the user clicks the reset link
      if (!session) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('resetInvalid').style.display = 'block';
      }
    }

    async function doResetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errEl = document.getElementById('resetError');
      const resetBtn = document.getElementById('resetBtn');

      errEl.style.display = 'none';

      if (!newPassword || !confirmPassword) {
        errEl.textContent = 'Please fill in both fields.';
        errEl.style.display = 'block';
        return;
      }
      if (newPassword.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating…';

      const { error } = await db.auth.updateUser({ password: newPassword });

      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Set new password';
        return;
      }

      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('resetSuccess').style.display = 'block';
    }

    function toggleMenu() {
      document.querySelector('.nav-links').classList.toggle('open');
    }

    initReset();
  </script>

</body>
</html>
